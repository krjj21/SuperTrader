# ================================================
# SuperTrader 설정
# Factor Stock Selection + ML Timing
# ================================================

kis:
  base_url: https://openapivts.koreainvestment.com:29443  # 모의투자
  is_virtual: true
  token_refresh_hours: 20

# ── 유니버스 설정 ──
universe:
  market: "KOSPI"                 # KOSPI, KOSDAQ, ALL
  min_market_cap: 500_000_000_000  # 최소 시가총액 5000억 (cap_rank 비활성 시 적용)
  min_avg_volume: 300_000        # 최소 20일 평균 거래량
  exclude_sectors: []             # 제외 섹터
  # Mid-cap rank 필터 (둘 다 >0 시 활성화, min_market_cap 절대값 대체)
  # 2026-05-06 sweep: cap_rank 는 *무의미한 변수*로 검증됨. 5개 페어
  # (0,0)/(1,30)/(1,100)/(30,100)/(30,150) 가 모두 동일 풀 생성 — IC-weighted
  # composite + neutralizer 가 cap_rank 필터와 독립적으로 같은 종목 선택.
  # 옛 메모의 +515% baseline 은 raw 백분율을 ×100 한 단위 표기 오류였음.
  cap_rank_min: 0                # 0 = 비활성 (min_market_cap 절대값 모드)
  cap_rank_max: 0                # 0 = 비활성

# ── 팩터 설정 ──
factors:
  factor_module: "both"              # alpha101, alpha158, both
  rebalance_freq: "biweekly"      # biweekly, monthly, quarterly  (격주로 변경)
  # 2026-05-06 sweep: top_n=30 채택. top_n=15 → +6.38% / Sharpe -2.00,
  # top_n=30 → +14.55% / Sharpe -0.82 (수익 2배 + Sharpe 개선). cap_rank 무관.
  top_n: 30                       # 종목풀 크기
  composite_method: "ic_weighted" # equal, ic_weighted
  ic_lookback: 12                 # IC 계산 lookback (개월)
  min_ir: 0.3                     # 최소 IR 임계값
  neutralize_industry: true
  neutralize_market_cap: true
  # 투자자 매매 사전 필터 (build_stock_pool 진입 시 universe 축소)
  foreign_filter_enabled: true   # sappo_investor_trading 활용 (라이브 + scraper 필요)
  foreign_filter_pct: 0.5         # 누적 순매수 상위 50%만 통과
  foreign_filter_lookback: 20     # 누적 영업일
  # B1 (라운드 6): foreign(외국인만) | foreign_organ(외국인+기관 합산)
  # 한국 시장 3축 — 기관 합산 시 신호 표면적 ↑. 1주 shadow 후 flip 권장.
  investor_filter_mode: "foreign"

# ── 타이밍 모델 설정 ──
timing:
  model: "xgboost"                # none, macd, kdj, decision_tree, xgboost, lightgbm, lstm, transformer
  forward_days: 5                 # 라벨 생성용 미래 수익률 기간.
  # 2026-05-06 실험: fd=10 / fd=dynamic(ATR+regime) 모두 baseline 대비 악화 → fd=5 유지.
  # 동적 forward_days 기능은 코드에서 제거됨 (구현 가설 검증 실패).
  buy_threshold: 0.02             # +2% 이상이면 매수 라벨
  sell_threshold: -0.02           # -2% 이하면 매도 라벨

  # MACD 파라미터
  macd:
    fast: 12
    slow: 26
    signal: 9

  # KDJ 파라미터
  kdj:
    n: 9
    m1: 3
    m2: 3

  # Decision Tree
  decision_tree:
    max_depth: 8
    min_samples_leaf: 20

  # XGBoost / LightGBM
  gradient_boost:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8

  # LSTM
  lstm:
    sequence_length: 20
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    learning_rate: 0.001
    epochs: 100
    batch_size: 64

  # Transformer
  transformer:
    sequence_length: 30
    d_model: 128
    nhead: 4
    num_layers: 2
    dropout: 0.1
    learning_rate: 0.001    # Tier 1: batch 64→256 (4x), sqrt LR scaling 5e-4→1e-3
    epochs: 100
    batch_size: 256         # Tier 1: 64→256, num_workers=4 + pin_memory + fused AdamW

  # PPO RL
  rl:
    learning_rate: 0.0003
    gamma: 0.99
    group_size: 8
    clip_epsilon_low: 0.2
    clip_epsilon_high: 0.28
    entropy_coeff: 0.03
    epochs_per_update: 4
    episodes: 200
    hidden_dim: 256
    buy_action_threshold: 0.03
    sell_action_threshold: 0.06
    # SAPPO: reward += lambda × sentiment(code, date). 0 = 기본 PPO
    sentiment_lambda: 0.0
    sentiment_source: "off"   # off/news/mock/xgb_proxy
    # Hybrid: XGB SELL 신뢰도 이 임계값 이상일 때만 RL 보류 무시 매도
    xgb_sell_confidence_threshold: 0.60
    # Hybrid: XGB BUY 신뢰도 이상일 때만 진입 (false positive 차단, 2026-04-28 추가)
    xgb_buy_confidence_threshold: 0.55
    # Ensemble: 시드 3개 median Sharpe 모델 채택 (회귀 방지). 비활성: []
    ensemble_seeds: [42, 1, 2]
    # Profit-aware adaptive SELL threshold (#3, 2026-05-04).
    # XGB p_sell 이 추세장 한복판에서 0.50 부근에 갇혀 0.60 게이트를 못 넘는 구조 보정.
    # pnl ≤ floor: 변경 없음 / floor ~ ceiling: 선형 인하 / pnl ≥ ceiling: 최대 인하 적용.
    # 예: pnl=+30%, floor=0.10, ceiling=0.30, max_discount=0.20 → 0.60 × 0.80 = 0.48 으로 게이트 완화.
    profit_aware_sell_enabled: true
    profit_aware_sell_pnl_floor: 0.10
    profit_aware_sell_max_discount: 0.20
    profit_aware_sell_pnl_ceiling: 0.30

# ── Regime Detector (시장 국면) ──
# Phase 1+2: 라벨링 + 팩터/포지션 사이즈 모듈레이션. RL state 통합은 별도 라운드.
regime:
  enabled: true            # false = 매일 라벨만 기록, 매매 영향 0
  lambda: 0.0              # 0=영향 없음 (dark-launch), 1=풀 적용
  hmm_lookback_days: 60    # KOSPI 과거 N일 (return + rolling vol) 입력
  hmm_n_states: 3          # 3-state classification
  llm_override_threshold: 0.3   # |LLM score| > 임계 시 HMM 결과 강등/승격
  news_fetch_enabled: true
strategy:
  name: "factor_hybrid"
  params:
    rsi_period: 14
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    bb_period: 20
    bb_std: 2.0
    atr_period: 14
    atr_multiplier: 2.0

# ── 리스크 관리 ──
risk:
  max_position_pct: 0.05          # 종목당 최대 5%
  max_total_positions: 30         # 최대 30종목
  daily_loss_limit_pct: 0.05      # 일일 손실 한도 5%
  stop_loss_pct: 0.07             # 개별 손절 7%
  max_order_retries: 3
  # Confidence-proportional sizing (2026-05-01 채택)
  # OOS 92회 백테스트: scale 1.0/2.0 가 OFF 대비 total_return +123%p,
  # Sharpe도 -2.53 → -2.00 동시 개선, MDD 거의 동일(-114%).
  confidence_sizing_enabled: true
  confidence_sizing_mode: scale     # clamp(하향) | scale(상향, 0.5~1.0 → min~max 선형)
  confidence_sizing_min_mult: 1.0   # 약신호도 풀 슬롯 (1.0×)
  confidence_sizing_max_mult: 2.0   # 강신호는 2× 슬롯
  # E1 변동성 진입 게이트 (라운드 6, dark-launch).
  # BUY 신호의 ATR/price 가 max_pct 이상이면 거부 (SELL 은 절대 차단 X).
  # stop_loss(-7%) 보다 먼저 발동해 손절 빈도를 줄이는 1차 진입 필터.
  atr_filter_enabled: false         # 1주 shadow 후 true 로 flip
  atr_filter_max_pct: 0.05          # ATR/price > 5% 시 진입 거부
  atr_filter_period: 14
  # C (2026-05-07): 부분 익절 + 트레일링 스탑.
  # SELL 신호 시 100% 매도 대신 1차 partial_take_profit_pct 매도 (잔여 보유),
  # 잔여는 peak (보유 후 최고가) 대비 trailing_stop_pct 하락 시 전량 매도.
  # AI 일일 피드백: "RSI 84 + 5일 +9.8% 강한 모멘텀에서 매도 후 추가 상승 놓침".
  partial_take_profit_enabled: false
  partial_take_profit_pct: 0.50     # 1차 50% 익절
  trailing_stop_pct: 0.03           # peak 대비 -3% 시 잔여 매도
  # E (2026-05-07): LLM SELL 보류 강화 — RSI 단독 강한 모멘텀 보호.
  # 현재 5조건 (MA20위 AND MA5위 AND RSI≥50 AND 1d≥-1% AND 5d≥+1%) 외에,
  # RSI ≥ threshold 단독 충족 시 SELL 보류. C 와 함께 도입 권장 (보류 ↑ + 부분 익절 보호).
  llm_strong_momentum_hold_enabled: false
  llm_strong_momentum_rsi_threshold: 80.0

# ── 스케줄 ──
schedule:
  pre_market: "08:30"
  market_open: "09:00"
  market_close: "15:30"
  post_market: "15:40"
  check_interval_sec: 300          # 5분 간격
  rebalance_day: 1                 # 매월 첫 거래일

# ── 백테스트 ──
backtest:
  start_date: "2018-01-01"
  end_date: "2024-12-31"
  initial_capital: 100_000_000     # 1억
  commission_rate: 0.00015         # 0.015%
  tax_rate: 0.0023                 # 매도세 0.23%
  slippage_pct: 0.0015             # per leg 0.15% (mid-cap 시초가 호가 한 단계)
  stop_loss_gap_penalty_pct: 0.015 # 손절 트리거 시 T+1 시가 추가 갭다운 1.5% (보수적)
  train_ratio: 0.5                 # walk-forward: 앞 50% 학습, 뒤 50% 테스트 (1.0 = 전체 in-sample)

# ── 데이터베이스 ──
database:
  path: "data/trading.db"

# ── 로깅 ──
logging:
  level: "INFO"
  file: "logs/supertrader.log"
  rotation: "10 MB"
  retention: "30 days"

notification:
  slack:
    enabled: true

# ── Codex CLI 자동 리뷰 ──
# scripts/codex_review.py 를 통해 일일 리포트/백테스트 결과를 codex 로 자동 리뷰
codex:
  enabled: false          # true 로 켜면 daily_report 이후 자동 실행
  daily_review: true      # daily 리뷰 트리거
  model: ""               # codex 모델 override (빈 문자열이면 codex 기본값)
