<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperTrader — Training Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 24px; font-weight: 700; color: #fff; }
        .header h1 span { color: #58a6ff; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .back-link { color: #58a6ff; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
        .timestamp { font-size: 13px; color: #8b949e; }
        .status-dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; margin-right: 6px;
        }
        .dot-training { background: #d29922; animation: pulse 1.5s infinite; }
        .dot-completed { background: #3fb950; }
        .dot-idle { background: #484f58; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 16px;
        }
        .card-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .card-value { font-size: 24px; font-weight: 700; }
        .card-sub { font-size: 13px; margin-top: 4px; }
        .positive { color: #3fb950; }
        .negative { color: #f85149; }
        .neutral { color: #8b949e; }
        .sac-color { color: #58a6ff; }
        .ppo-color { color: #bc8cff; }

        .chart-wrap {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 768px) {
            .chart-row { grid-template-columns: 1fr; }
        }

        .compare-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }
        .compare-table th {
            text-align: left;
            padding: 10px 16px;
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            border-bottom: 1px solid #30363d;
        }
        .compare-table th:nth-child(n+2) { text-align: right; }
        .compare-table td {
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 1px solid #21262d;
        }
        .compare-table td:nth-child(n+2) { text-align: right; font-variant-numeric: tabular-nums; }
        .compare-table tr:last-child td { border-bottom: none; }
        .winner { font-weight: 700; }

        .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #484f58; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="header">
        <h1><span>Training</span> Monitor</h1>
        <div class="header-right">
            <a href="/" class="back-link">Dashboard</a>
            <div class="timestamp">
                <span id="refresh-ts">Loading...</span>
                <span style="margin-left:8px;color:#484f58;">10s auto-refresh</span>
            </div>
        </div>
    </div>

    <div class="cards" id="summary-cards">
        <div class="card"><div class="card-label">Loading...</div></div>
    </div>

    <!-- Comparison Table -->
    <div class="chart-wrap" id="compare-section" style="display:none;">
        <div class="chart-title">SAC vs PPO Comparison</div>
        <div id="compare-body"></div>
    </div>

    <!-- Charts -->
    <div class="chart-row">
        <div class="chart-wrap">
            <div class="chart-title">Validation Sharpe</div>
            <canvas id="sharpeChart" height="200"></canvas>
        </div>
        <div class="chart-wrap">
            <div class="chart-title">Validation Return (%)</div>
            <canvas id="returnChart" height="200"></canvas>
        </div>
    </div>
    <div class="chart-row">
        <div class="chart-wrap">
            <div class="chart-title">Avg Trades / Episode</div>
            <canvas id="tradesChart" height="200"></canvas>
        </div>
        <div class="chart-wrap">
            <div class="chart-title">Episode Reward</div>
            <canvas id="rewardChart" height="200"></canvas>
        </div>
    </div>

    <div class="footer">SuperTrader Training Monitor — SAC / PPO RL</div>

    <script>
        let sharpeChart, returnChart, tradesChart, rewardChart;

        function statusDot(s) {
            const cls = s === 'training' ? 'dot-training' : s === 'completed' ? 'dot-completed' : 'dot-idle';
            const label = s === 'training' ? 'Training' : s === 'completed' ? 'Completed' : 'Idle';
            return `<span class="status-dot ${cls}"></span>${label}`;
        }

        function pctClass(v) { return v > 0 ? 'positive' : v < 0 ? 'negative' : 'neutral'; }
        function fmt(v, d=2) { return v != null ? v.toFixed(d) : '-'; }

        function renderSummary(data) {
            const sac = data.sac || {};
            const ppo = data.ppo || {};
            const sacLast = sac.entries && sac.entries.length ? sac.entries[sac.entries.length - 1] : null;
            const ppoLast = ppo.entries && ppo.entries.length ? ppo.entries[ppo.entries.length - 1] : null;

            return `
                <div class="card">
                    <div class="card-label">SAC Status</div>
                    <div class="card-value" style="font-size:16px;">${statusDot(sac.status)}</div>
                    <div class="card-sub neutral">${sacLast ? `Ep ${sacLast.episode}/${sacLast.total}` : '-'}</div>
                </div>
                <div class="card">
                    <div class="card-label">SAC Best Sharpe</div>
                    <div class="card-value sac-color">${fmt(sac.best_sharpe, 3)}</div>
                    <div class="card-sub neutral">ent_coef: 0.1</div>
                </div>
                <div class="card">
                    <div class="card-label">SAC Latest</div>
                    <div class="card-value ${pctClass(sacLast?.val_return)}">${sacLast ? fmt(sacLast.val_return) + '%' : '-'}</div>
                    <div class="card-sub neutral">trades: ${sacLast ? fmt(sacLast.trades, 1) : '-'}</div>
                </div>
                <div class="card">
                    <div class="card-label">PPO Status</div>
                    <div class="card-value" style="font-size:16px;">${statusDot(ppo.status)}</div>
                    <div class="card-sub neutral">${ppoLast ? `Ep ${ppoLast.episode}/${ppoLast.total}` : '-'}</div>
                </div>
                <div class="card">
                    <div class="card-label">PPO Best Sharpe</div>
                    <div class="card-value ppo-color">${fmt(ppo.best_sharpe, 3)}</div>
                </div>
                <div class="card">
                    <div class="card-label">PPO Latest</div>
                    <div class="card-value ${pctClass(ppoLast?.val_return)}">${ppoLast ? fmt(ppoLast.val_return) + '%' : '-'}</div>
                    <div class="card-sub neutral">trades: ${ppoLast ? fmt(ppoLast.trades, 1) : '-'}</div>
                </div>
            `;
        }

        function renderCompare(data) {
            const sac = data.sac?.final;
            const ppo = data.ppo?.final;
            if (!sac && !ppo) return '';

            const rows = [
                ['Sharpe', sac?.sharpe, ppo?.sharpe, true],
                ['Return (%)', sac?.return, ppo?.return, true],
                ['Win Rate (%)', sac?.win_rate, ppo?.win_rate, true],
                ['Avg Trades', sac?.avg_trades, ppo?.avg_trades, true],
            ];

            let html = '<table class="compare-table"><thead><tr><th>Metric</th><th class="sac-color">SAC</th><th class="ppo-color">PPO</th><th>Winner</th></tr></thead><tbody>';
            for (const [name, sv, pv, higherBetter] of rows) {
                const sWin = sv != null && pv != null && (higherBetter ? sv > pv : sv < pv);
                const pWin = sv != null && pv != null && (higherBetter ? pv > sv : pv < sv);
                const winner = sv == null || pv == null ? '-' : sWin ? 'SAC' : pWin ? 'PPO' : 'Tie';
                const wClass = winner === 'SAC' ? 'sac-color' : winner === 'PPO' ? 'ppo-color' : 'neutral';
                html += `<tr>
                    <td>${name}</td>
                    <td class="${sWin ? 'winner sac-color' : ''}">${sv != null ? fmt(sv, 3) : '-'}</td>
                    <td class="${pWin ? 'winner ppo-color' : ''}">${pv != null ? fmt(pv, 3) : '-'}</td>
                    <td class="${wClass} winner">${winner}</td>
                </tr>`;
            }
            html += '</tbody></table>';
            return html;
        }

        function makeChart(ctx, sacData, ppoData, label, yKey) {
            const sacEps = sacData.map(e => e.episode);
            const ppoEps = ppoData.map(e => e.episode);
            const datasets = [];
            if (sacData.length) {
                datasets.push({
                    label: 'SAC', data: sacData.map(e => e[yKey]),
                    borderColor: '#58a6ff', borderWidth: 2, pointRadius: 2, tension: 0.3,
                });
            }
            if (ppoData.length) {
                datasets.push({
                    label: 'PPO', data: ppoData.map(e => e[yKey]),
                    borderColor: '#bc8cff', borderWidth: 2, pointRadius: 2, tension: 0.3, borderDash: [4,4],
                });
            }
            const labels = sacData.length >= ppoData.length ? sacEps : ppoEps;
            return new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
                    scales: {
                        x: { title: { display: true, text: 'Episode', color: '#484f58' }, ticks: { color: '#484f58' }, grid: { color: '#21262d' } },
                        y: { ticks: { color: '#484f58' }, grid: { color: '#21262d' } },
                    },
                },
            });
        }

        async function refresh() {
            try {
                const res = await fetch('/api/training');
                const data = await res.json();
                if (!data.ok) return;

                document.getElementById('refresh-ts').textContent = new Date().toLocaleTimeString();
                document.getElementById('summary-cards').innerHTML = renderSummary(data);

                const sacE = data.sac?.entries || [];
                const ppoE = data.ppo?.entries || [];

                // Charts
                if (sharpeChart) sharpeChart.destroy();
                if (returnChart) returnChart.destroy();
                if (tradesChart) tradesChart.destroy();
                if (rewardChart) rewardChart.destroy();

                sharpeChart = makeChart(document.getElementById('sharpeChart'), sacE, ppoE, 'Val Sharpe', 'val_sharpe');
                returnChart = makeChart(document.getElementById('returnChart'), sacE, ppoE, 'Val Return', 'val_return');
                tradesChart = makeChart(document.getElementById('tradesChart'), sacE, ppoE, 'Trades', 'trades');
                rewardChart = makeChart(document.getElementById('rewardChart'), sacE, ppoE, 'Reward', 'reward');

                // Compare table
                const compareHtml = renderCompare(data);
                if (compareHtml) {
                    document.getElementById('compare-section').style.display = '';
                    document.getElementById('compare-body').innerHTML = compareHtml;
                }
            } catch (e) {}
        }

        refresh();
        setInterval(refresh, 10000);
    </script>
</body>
</html>
